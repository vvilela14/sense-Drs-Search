<!doctype html>
<html>
<head>
<script>
  // GitHub Pages clean URL handler
  // Redirects /path → /path.html internally
  var path = window.location.pathname;
  if (path !== '/' && !path.endsWith('.html') && !path.includes('.')) {
    window.location.replace(path + '.html');
  }
</script>
</head>
<body>
<p>Página não encontrada. <a href="/">Voltar ao início</a></p>
</body>
</html>
